name: Build APK
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev
          
      - name: Install Buildozer and dependencies
        run: |
          pip3 install --user --upgrade buildozer cython
          
      - name: Build APK
        run: |
          # Création du répertoire de configuration pour éviter les blocages
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          # Lancement de la compilation
          buildozer android debug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: bin/*.apk
          
